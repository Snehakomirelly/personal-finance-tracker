<!DOCTYPE html>
<html>
<head>
<title>Add Transaction</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="form-container">
<h1>➕ Add Transaction</h1>
<form method="POST">
<label>
Title
</label>
<input 
type="text"
name="title"
placeholder="Enter title"
required>
<label>
Amount
</label>
<input
type="number"
name="amount"
placeholder="Enter amount"
min="1"
required>
<label>
Category
</label>
<select name="category" required>
<option value="">
Select Category
</option>
<option value="Food">
Food
</option>
<option value="Travel">
Travel
</option>
<option value="Shopping">
Shopping
</option>
<option value="Education">
Education
</option>
<option value="Bills">
Bills
</option>
<option value="Entertainment">
Entertainment
</option>
<option value="Other">
Other
</option>
</select>
<label>
Transaction Type
</label>
<select name="type" required>
<option value="Expense">
Expense
</option>
<option value="Income">
Income
</option>
</select>
<label>
Date
</label>
<input
type="date"
name="date"
required>
<label>
Notes
</label>
<textarea
name="notes"
placeholder="Add notes (optional)"
rows="4"></textarea>
<button class="save-btn">
Save Transaction
</button>
<a class="back-btn" href="/">
⬅ Back to Dashboard
</a>
</form>
</div>
</body>
</html>
